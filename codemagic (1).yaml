workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 30
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - name: Change to project directory
        script: cd luxury_crm_project || true
      - name: Get Flutter packages
        script: cd luxury_crm_project && flutter pub get || flutter pub get
      - name: Build APK
        script: cd luxury_crm_project && flutter build apk --release || flutter build apk --release
    artifacts:
      - luxury_crm_project/build/app/outputs/flutter-apk/*.apk
      - build/app/outputs/flutter-apk/*.apk
